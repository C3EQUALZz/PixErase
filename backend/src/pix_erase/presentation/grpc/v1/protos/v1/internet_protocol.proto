syntax = "proto3";

package pix_erase.v1;

message PingRequest {
  string destination_address = 1;
  double timeout = 2;
  int32 packet_size = 3;
  optional int32 ttl = 4;
}

message PingResponse {
  bool success = 1;
  optional double response_time_ms = 2;
  optional string error_message = 3;
  optional int32 ttl = 4;
  optional int32 packet_size = 5;
}

message ReadIPInfoRequest {
  string ip_address = 1;
}

message ReadIPInfoResponse {
  string ip_address = 1;
  optional string isp = 2;
  optional string organization = 3;
  optional string country = 4;
  optional string region_name = 5;
  optional string city = 6;
  optional string zip_code = 7;
  optional double latitude = 8;
  optional double longitude = 9;
  bool has_location = 10;
  bool has_network_info = 11;
  string location_string = 12;
  string network_string = 13;
}

message ScanPortRequest {
  string target = 1;
  int32 port = 2;
  double timeout = 3;
}

message PortScanResultResponse {
  int32 port = 1;
  string status = 2;
  optional double response_time = 3;
  optional string service = 4;
  optional string error_message = 5;
  optional string scanned_at = 6;
}

message ScanPortsRequest {
  string target = 1;
  repeated int32 ports = 2;
  double timeout = 3;
  int32 max_concurrent = 4;
}

message ScanPortsResponse {
  repeated PortScanResultResponse results = 1;
}

message ScanPortRangeRequest {
  string target = 1;
  int32 start_port = 2;
  int32 end_port = 3;
  double timeout = 4;
  int32 max_concurrent = 5;
}

message ScanCommonPortsRequest {
  string target = 1;
  double timeout = 2;
  int32 max_concurrent = 3;
}

message PortScanSummaryResponse {
  string target = 1;
  string port_range = 2;
  int32 total_ports = 3;
  int32 open_ports = 4;
  int32 closed_ports = 5;
  int32 filtered_ports = 6;
  double scan_duration = 7;
  string started_at = 8;
  string completed_at = 9;
  double success_rate = 10;
  repeated PortScanResultResponse results = 11;
}

message AnalyzeDomainRequest {
  string domain = 1;
  double timeout = 2;
}

message DnsRecordEntry {
  string record_type = 1;
  repeated string values = 2;
}

message AnalyzeDomainResponse {
  string domain_id = 1;
  string domain_name = 2;
  repeated DnsRecordEntry dns_records = 3;
  repeated string subdomains = 4;
  optional string title = 5;
  optional string created_at = 6;
  optional string updated_at = 7;
}

service InternetProtocolService {
  rpc Ping (PingRequest) returns (PingResponse);
  rpc ReadIPInfo (ReadIPInfoRequest) returns (ReadIPInfoResponse);
  rpc ScanPort (ScanPortRequest) returns (PortScanResultResponse);
  rpc ScanPorts (ScanPortsRequest) returns (ScanPortsResponse);
  rpc ScanPortRange (ScanPortRangeRequest) returns (PortScanSummaryResponse);
  rpc ScanCommonPorts (ScanCommonPortsRequest) returns (PortScanSummaryResponse);
  rpc AnalyzeDomain (AnalyzeDomainRequest) returns (AnalyzeDomainResponse);
}
